<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edu Agenda - Premium TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header>
            <div class="user-info">
                <img id="user-photo" src="https://via.placeholder.com/100" alt="Avatar">
                <div>
                    <h1 id="greeting">Hola!</h1>
                    <p id="date-display">Carregant dades...</p>
                </div>
            </div>
            <div class="status-badge" id="weather-badge">
                <span id="temp-val">--°</span>
                <span id="weather-icon">--</span>
            </div>
        </header>

        <!-- TAB CONTENTS -->
        <main>
            <!-- TAB: HOME -->
            <section id="tab-home" class="tab-content active">
                <section class="card glass" id="daily-summary">
                    <h2>🌅 Resum del dia</h2>
                    <div id="summary-content">
                        <div class="loading">
                            <div class="skeleton" style="height: 20px; width: 100%;"></div>
                            <div class="skeleton" style="height: 20px; width: 90%;"></div>
                        </div>
                    </div>
                </section>

                <div class="card-grid">
                    <section class="card glass" id="agenda-preview">
                        <div class="card-header">
                            <h2>📅 Avui</h2>
                            <button class="btn-icon add-btn">+</button>
                        </div>
                        <ul id="preview-list"></ul>
                    </section>

                    <section class="card glass" id="mail-preview">
                        <h2>📧 Correus Recents</h2>
                        <div id="mail-content-preview">
                            <div class="loading"><div class="skeleton" style="height: 40px;"></div></div>
                        </div>
                    </section>
                </div>
            </section>

            <!-- TAB: CALENDAR -->
            <section id="tab-calendar" class="tab-content">
                <div class="card-header">
                    <h2 class="title-large">La Teva Agenda</h2>
                    <button class="btn-icon add-btn">+</button>
                </div>
                <div id="full-agenda-list"></div>
            </section>

            <!-- TAB: AI CHAT -->
            <section id="tab-ai" class="tab-content">
                <h2 class="title-large">Assistent d'IA</h2>
                <div id="chat-container" class="glass">
                    <div id="chat-messages">
                        <div class="msg bot">Hola! Com et puc ajudar avui? 😊</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Escriu aquí...">
                        <button id="send-msg">🚀</button>
                    </div>
                </div>
            </section>

            <!-- TAB: SETTINGS -->
            <section id="tab-settings" class="tab-content">
                <h2 class="title-large">Ajustos</h2>
                <div class="card glass">
                    <div class="setting-item">
                        <label>Hora del resum matinal</label>
                        <input type="time" id="pref-summary-time">
                    </div>
                    <div class="setting-item">
                        <label>Durada per defecte (min)</label>
                        <input type="number" id="pref-duration" min="15" max="480" step="15">
                    </div>
                    <button id="save-prefs" class="btn-primary">Guardar Canvis</button>
                </div>
                
                <div class="card glass secondary">
                    <p style="font-size: 0.8rem; opacity: 0.6; text-align: center;">Vols desconnectar el Google Calendar?</p>
                    <button id="reauth-btn" class="btn-secondary">Tornar a Autoritzar</button>
                </div>
            </section>
        </main>

        <!-- NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="home">
                <span class="icon">🏠</span>
                <span>Inici</span>
            </button>
            <button class="nav-item" data-tab="calendar">
                <span class="icon">🗓️</span>
                <span>Agenda</span>
            </button>
            <button class="nav-item" data-tab="ai">
                <span class="icon">🧠</span>
                <span>Assistent</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <span class="icon">⚙️</span>
                <span>Ajustos</span>
            </button>
        </nav>
    </div>

    <!-- MODAL: ADD EVENT -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content glass">
            <h3>Nou Esdeveniment</h3>
            <div class="form-group">
                <label>Títol</label>
                <input type="text" id="ev-title" placeholder="Reunió de treball...">
            </div>
            <div class="form-group-row">
                <div>
                    <label>Data</label>
                    <input type="date" id="ev-date">
                </div>
                <div>
                    <label>Hora</label>
                    <input type="time" id="ev-time">
                </div>
            </div>
            <div class="modal-actions">
                <button id="close-modal" class="btn-text">Cancel·la</button>
                <button id="submit-event" class="btn-primary">Crea Event</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
