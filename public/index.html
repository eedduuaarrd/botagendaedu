<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Executive OS | Celestial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header>
            <div class="profile-section">
                <h1 id="greeting">Hola Edu</h1>
                <p id="date-display">SISTEMA OPERATIU ACTIU</p>
            </div>
            <div class="status-indicator">
                <div class="status-dot"></div>
            </div>
        </header>

        <!-- MAIN VIEWS -->
        <main>
            <!-- DASHBOARD -->
            <section id="view-home" class="view-layer active">
                <div class="dashboard-grid">
                    <!-- Weather -->
                    <div class="widget widget-full">
                        <div class="widget-title"><i data-lucide="cloud"></i> Atosfera Actual</div>
                        <div class="weather-main">
                            <div>
                                <span class="balance-val" id="temp-val">--°</span>
                                <p id="weather-desc" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">CARREGANT...</p>
                            </div>
                            <div class="chart-container">
                                <canvas id="weather-mini-chart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Finance -->
                    <div class="widget" id="open-finance">
                        <div class="widget-title"><i data-lucide="compass"></i> Actius</div>
                        <div class="balance-container">
                            <span class="balance-val" id="balance-display">0€</span>
                            <span class="balance-trend">+0.0%</span>
                        </div>
                    </div>

                    <!-- Habits -->
                    <div class="widget" id="open-habits">
                        <div class="widget-title"><i data-lucide="activity"></i> Habits</div>
                        <div id="habits-preview" class="habit-list">
                            <p style="font-size: 0.75rem; opacity: 0.3;">Sincronitzant...</p>
                        </div>
                    </div>

                    <!-- Briefing -->
                    <div class="widget widget-full">
                        <div class="widget-title"><i data-lucide="command"></i> Briefing Executiu</div>
                        <div id="summary-content" style="font-size: 0.9rem; line-height: 1.6; color: var(--text-primary);">
                            Generant informe de situació...
                        </div>
                    </div>
                </div>

                <div class="section-header">
                    <div class="section-title"><i data-lucide="calendar"></i> Pròxims</div>
                </div>
                <div id="preview-list"></div>
            </section>

            <!-- AGENDA -->
            <section id="view-calendar" class="view-layer">
                <div class="section-header">
                    <div class="section-title"><i data-lucide="layers"></i> Línia de Temps</div>
                </div>
                <div id="full-agenda-list"></div>
            </section>

            <!-- INTELLIGENCE -->
            <section id="view-ai" class="view-layer">
                <div class="section-header">
                    <div class="section-title"><i data-lucide="sparkles"></i> Intel·ligència</div>
                </div>
                <div id="chat-messages" class="chat-window"></div>
                <div style="margin-top: 20px;">
                    <div class="input-group">
                        <input type="text" id="chat-input" class="input-modern" placeholder="Demana qualsevol cosa...">
                        <button id="send-msg" class="btn-icon"><i data-lucide="arrow-up"></i></button>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 10px;">
                        <button class="nav-btn" style="background: rgba(255,255,255,0.05); padding: 10px 15px;" onclick="quickAi('Resum emails')"><span>Emails</span></button>
                        <button class="nav-btn" style="background: rgba(255,255,255,0.05); padding: 10px 15px;" onclick="quickAi('Estat agenda')"><span>Agenda</span></button>
                        <button class="nav-btn" style="background: rgba(255,255,255,0.05); padding: 10px 15px;" onclick="quickAi('Anàlisi diners')"><span>Actius</span></button>
                    </div>
                </div>
            </section>

            <!-- VAULT -->
            <section id="view-vault" class="view-layer">
                <div class="section-header">
                    <div class="section-title"><i data-lucide="database"></i> El Vault</div>
                </div>
                <div class="widget widget-full">
                    <div class="widget-title">Transaccions</div>
                    <div id="finance-history" style="max-height: 250px; overflow-y: auto;"></div>
                    <div class="input-group" style="margin-top: 20px;">
                        <input type="number" id="finance-amount" class="input-modern" placeholder="0.00">
                        <button id="add-expense" class="btn-icon"><i data-lucide="plus"></i></button>
                    </div>
                </div>

                <div class="widget widget-full" style="margin-top: 20px;">
                    <div class="widget-title">Logs de Comunicació</div>
                    <div id="email-list-container"></div>
                </div>
            </section>
        </main>

        <!-- NAVIGATION -->
        <nav class="nav-bar">
            <button class="nav-btn active" data-view="home"><i data-lucide="home"></i><span>Inici</span></button>
            <button class="nav-btn" data-view="calendar"><i data-lucide="calendar"></i><span>Agenda</span></button>
            <button class="nav-btn" data-view="ai"><i data-lucide="zap"></i><span>IA</span></button>
            <button class="nav-btn" data-view="vault"><i data-lucide="shield"></i><span>Vault</span></button>
        </nav>
    </div>

    <!-- MODAL: ADD EVENT -->
    <div id="event-modal" class="modal-mask hidden">
        <div class="modal-surface">
            <div class="section-title" style="margin-bottom: 25px; font-size: 1.2rem;">Nou Esdeveniment</div>
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="text" id="ev-title" class="input-modern" placeholder="Títol">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><input type="date" id="ev-date" class="input-modern"></div>
                <div class="input-group"><input type="time" id="ev-time" class="input-modern"></div>
            </div>
            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 12px;">
                <button id="submit-event" class="btn-icon" style="width: 100%; border-radius: 16px; font-weight: 700;">CONFIRMAR</button>
                <button id="close-modal" style="background: none; border: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; padding: 10px;">CANCEL·LAR</button>
            </div>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab-main" id="open-modal-btn">
        <i data-lucide="plus"></i>
    </button>

    <script src="app.js"></script>
</body>
</html>
