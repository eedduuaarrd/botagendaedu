<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Edu Agenda - Stealth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header>
            <div class="user-profile">
                <h1 id="greeting">Hola!</h1>
                <p id="date-display">--</p>
            </div>
        </header>

        <!-- MAIN -->
        <main>
            <!-- TAB: HOME -->
            <section id="tab-home" class="tab-content active">
                <!-- Weather Compact -->
                <div class="card weather-compact">
                    <div>
                        <span class="temp-large" id="temp-val">--°</span>
                        <div style="font-size: 0.8rem; opacity: 0.6;" id="weather-desc">Actualitzant...</div>
                    </div>
                    <div class="weather-details">
                        <div id="wind-val">Vent: -- km/h</div>
                        <div id="humidity-val">Humitat: --%</div>
                    </div>
                </div>

                <!-- Briefing Card -->
                <div class="section-title">📊 Resum Executiu</div>
                <div class="card" id="summary-content" style="font-size: 0.9rem; line-height: 1.6; border-left: 2px solid var(--accent);">
                    Carregant briefing...
                </div>

                <!-- Split View: Emails & Tasks -->
                <div style="display: grid; grid-template-columns: 1fr; gap: 0px;">
                    <div>
                        <div class="section-title">📧 Emails Recents</div>
                        <div class="card" id="email-list-container" style="max-height: 250px; overflow-y: auto;">
                            <div class="text-center" style="opacity: 0.5; padding: 20px;">Busca de correus...</div>
                        </div>
                    </div>
                    
                    <div>
                        <div class="section-title">📝 Tasques Pendents</div>
                        <div class="card">
                            <div id="task-list-container"></div>
                            <div class="mt-4" style="display: flex; gap: 8px;">
                                <input type="text" id="new-task-input" class="input-flat" placeholder="Afegir tasca ràpida..." style="padding: 8px 12px; font-size: 0.85rem;">
                                <button id="add-task-btn" style="background: white; color: black; border: none; padding: 0 16px; border-radius: 8px; font-weight: 700;">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Next Events -->
                <div class="section-title">🗓️ Propers Esdeveniments</div>
                <div class="card" id="preview-list"></div>
            </section>

            <!-- TAB: CALENDAR -->
            <section id="tab-calendar" class="tab-content">
                <div class="section-title">Timeline d'Activitats</div>
                <div id="full-agenda-list"></div>
            </section>

            <!-- TAB: ASSISTANT -->
            <section id="tab-ai" class="tab-content">
                <div class="section-title">🤖 Assistent Intel·ligent</div>
                <div id="chat-messages" class="card" style="height: 60vh; margin-bottom: 12px; padding: 15px;"></div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="chat-input" class="input-flat" placeholder="Escriu la teva consulta...">
                    <button id="send-msg" class="btn-action" style="width: auto; padding: 0 20px;">Enviar</button>
                </div>
                <div style="margin-top: 12px; display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px;">
                    <button class="quick-cmd" onclick="quickAi('Què tinc avui?')">Avui</button>
                    <button class="quick-cmd" onclick="quickAi('Resumeix emails')">Emails</button>
                    <button class="quick-cmd" onclick="quickAi('Tinc temps lliure demà?')">Temps Lliure</button>
                </div>
            </section>

            <!-- TAB: SETTINGS -->
            <section id="tab-settings" class="tab-content">
                <div class="section-title">⚙️ Configuració del Sistema</div>
                <div class="card">
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Hora del Resum Diari</label>
                        <input type="time" id="pref-summary-time" class="input-flat">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Durada reunions (min)</label>
                        <input type="number" id="pref-duration" class="input-flat">
                    </div>
                    <button id="save-prefs" class="btn-action mt-4">Sincronitzar Preferències</button>
                </div>
                <div class="card" style="border-color: rgba(239, 68, 68, 0.2);">
                    <div style="font-size: 0.7rem; font-weight: 700; color: var(--danger); margin-bottom: 12px; text-transform: uppercase;">Manteniment</div>
                    <button id="reauth-btn" class="btn-action" style="background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2);">Reiniciar Google Auth</button>
                </div>
            </section>
        </main>

        <!-- SYSTEM NAV -->
        <nav class="system-nav">
            <button class="nav-link active" data-tab="home">Inici</button>
            <button class="nav-link" data-tab="calendar">Agenda</button>
            <button class="nav-link" data-tab="ai">IA</button>
            <button class="nav-link" data-tab="settings">Estat</button>
        </nav>
    </div>

    <!-- FAB -->
    <button class="fab add-btn">+</button>

    <!-- MODAL -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="margin-bottom: 24px; font-weight: 700;">Nou Esdeveniment</h3>
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Títol</label>
                <input type="text" id="ev-title" class="input-flat" placeholder="Introduir títol...">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Data</label>
                    <input type="date" id="ev-date" class="input-flat">
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Hora</label>
                    <input type="time" id="ev-time" class="input-flat">
                </div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button id="close-modal" style="background: none; border: none; color: var(--text-secondary); font-weight: 600; cursor: pointer; font-size: 0.9rem;">Cancel·lar</button>
                <button id="submit-event" class="btn-action" style="width: auto; padding: 10px 24px;">Guardar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
